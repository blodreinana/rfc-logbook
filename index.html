<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFC - Estágio Logbook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav-panel">
        <button onclick="changePage(-1)"><< SEMANA_PASSADA</button>
        <div class="nav-center">
            <input type="date" id="date-picker" onchange="jumpToDate()" title="Escolha qualquer dia para ir à semana correspondente">
            <button onclick="toggleTheme()" id="theme-btn" style="margin-left: 10px;">[ MUDAR_TEMA ]</button>
        </div>
        <button onclick="changePage(1)">PRÓXIMA_SEMANA >></button>
    </div>

    <div class="container">
        <header>
            <span class="save-indicator" id="save-status">SYSTEM_READY</span>
            <h1>RFC PROGRAMA DE ESTÁGIO</h1>
            
            <div class="subtitle">AUTHOR_USER: ALLANA HELENA CAMPOS ALBINO</div>
            
            <div class="meta-info">
                <span>ENTRY_ID: <span id="entry-id">SEMANA_001</span></span>
                <span class="day-counter" id="day-counter">SEMANA_01</span>
            </div>
        </header>

        <section>
            <h2>// 01. ATIVIDADES DA SEMANA</h2>
            <div id="box-1" class="content-box" contenteditable="true" oninput="autoSave()"></div>
        </section>

        <section>
            <h2>// 02. DESAFIOS TÉCNICOS</h2>
            <div id="box-2" class="content-box" contenteditable="true" oninput="autoSave()"></div>
        </section>

        <section>
            <h2>// 03. APRENDIZADOS & NOTAS</h2>
            <div id="box-3" class="content-box" contenteditable="true" oninput="autoSave()"></div>
        </section>

        <div class="action-buttons">
            <button class="btn-save" onclick="manualSave()">[+] SALVAR_LOG</button>
            <button onclick="clearCurrentPage()" style="font-size: 0.8em; border-color: red; color: red;">LIMPAR_PAGINA</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
